services:
  # PostgreSQL
  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${DATABASE_NAME:-postgres}
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    command: redis-server --requirepass "" --appendonly yes


# Civitas API Dev
  civitas-api-dev:
    build:
      context: ../
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    #deploy:
    #  resources:
    #    limits:
    #      cpus: '0.5' # limited to replicate the production environment resources
    #      memory: 2G # limited to replicate the production environment resources
   #     reservations:
   #       cpus: '0.5' # limited to replicate the production environment resources
  #        memory: 2G # limited to replicate the production environment resources
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    # Wait for Docker embedded DNS + TCP: avoids intermittent getaddrinfo / name resolution
    # failures right after postgres is healthy (depends_on does not guarantee API-side DNS).
    command:
      - /bin/bash
      - -lc
      - |
          set -e
          for i in $$(seq 1 60); do
            if python -c "import socket; s=socket.create_connection(('postgres', 5432), timeout=2); s.close()" 2>/dev/null; then
              echo "postgres is reachable"
              break
            fi
            if [ "$$i" -eq 60 ]; then
              echo "postgres not reachable after 60s (check Docker DNS / networks)" >&2
              exit 1
            fi
            echo "waiting for postgres ($$i/60)..."
            sleep 1
          done
          poetry install --with dev && aerich upgrade && poetry run uvicorn app.main:app --reload --host 0.0.0.0 --port 80
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:80/health', timeout=5).status==200 else sys.exit(1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ../:/app
      - ../scripts:/app/scripts
      - ../migrations:/app/migrations
      - ../pyproject.toml:/app/pyproject.toml
      - ../poetry.lock:/app/poetry.lock
      - ../alembic_migrations:/app/alembic_migrations
  
volumes:
  postgres_data: